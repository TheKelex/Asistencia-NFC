<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia</title>

    <link rel="stylesheet" href="./style.css"></link>
    <link rel="stylesheet" href="../Aparte/bootstrap-5.3.8-dist/css/bootstrap.css"></link> <!--Bootstrap CSS-->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" /> <!--Google Icons--> 

</head>
<body>
    
    <!--Row padre para la division del menu sticky-->
    <div class="row w-100 g-0">

        <!--================= Inicio menu sticky =================-->
        <div class="col-2 p-4 menu-sticky shadow d-flex flex-column">

            <div class="d-flex gap-2 mb-5 align-items-center"> <!--Nombre sistema / logo-->

                <span class="material-symbols-outlined logo-nfc p-2 text-white rounded-3">
                    nfc
                </span>

                <!--Evita el espaciado entre los textos-->
                <div class="p-0">
                    <h4 class="p-0 m-0" style="color: #226D00;">Asistencia</h4>
                    <p class="p-0 m-0" style="font-size: 0.8rem;">Sistema NFC</p>
                </div>

            </div>

            <!--Bloque opciones-->
            <div class="d-flex flex-column flex-grow-1 gap-3">

                <!--Bloque opcion (copy + paste)-->
                <a class="d-flex gap-2 btn-accion align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2">
                        dashboard
                    </span>
                    
                    <p class="my-auto">Dashboard</p>

                </a>

                <a class="d-flex gap-2 btn-accion-activo align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2" style="color: #226D00;">
                        event_seat
                    </span>
                    
                    <p class="my-auto">Sesion</p>

                </a>

                <a class="d-flex gap-2 btn-accion align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2">
                        history
                    </span>
                    
                    <p class="my-auto">Historial</p>

                </a>

                <a class="d-flex gap-2 btn-accion align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2">
                        analytics
                    </span>
                    
                    <p class="my-auto">Reportes</p>

                </a>

                <a class="d-flex gap-2 btn-accion align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2">
                        group
                    </span>
                    
                    <p class="my-auto">Aprendices</p>

                </a>

                <!--Ajustes-->
                <a class="d-flex gap-2 btn-accion mt-auto align-items-center py-3 rounded-3 text-decoration-none text-black" href="#">

                    <span class="material-symbols-outlined px-2" style="color: gray;">
                        settings
                    </span>
                    
                    <p class="my-auto" style="color: gray;">Ajustes</p>

                </a>

            </div>

        </div>
        <!--================= Fin menu sticky =================-->

        <div class="col-10 p-4 contenido container-fluid"> <!--Contenido-->

            <p>lorem100000</p>

        </div>

    </div>

</body>
</html>
